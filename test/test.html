<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Correlation Scatter Plot (Canvas)</title>

<style>
body {
  font-family: system-ui, sans-serif;
  background: #f5f7fa;
  padding: 30px;
}

.panel {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 14px;
  border: 1px solid #ddd;
}

.inputs {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 12px;
}

input, button {
  padding: 8px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.controls {
  margin: 14px 0;
  display: flex;
  gap: 10px;
}

canvas {
  border: 1px solid #ccc;
  border-radius: 14px;
  background: white;
}

.output {
  margin-top: 12px;
  font-weight: 700;
}

.tooltip {
  position: absolute;
  background: #222;
  color: white;
  padding: 6px 8px;
  border-radius: 8px;
  font-size: 12px;
  pointer-events: none;
  opacity: 0;
}
</style>
</head>

<body>
<div class="panel">

  <div class="inputs">
    <input id="x-data" value="1,2,3,4,5,6,7">
    <input id="y-data" value="1,1.5,2,2.5,3,3.4,4">
    <button onclick="generate()">Plot</button>
  </div>

  <div class="controls">
    <button onclick="toggleTrend()">Toggle Trend</button>
    <button onclick="randomData()">Random Data</button>
    <button onclick="resetPlot()">Reset</button>
  </div>

  <canvas id="plot" width="420" height="320"></canvas>
  <div id="tooltip" class="tooltip"></div>
  <div id="output" class="output"></div>

</div>

<script src="test.js"></script>
</body>
</html>
